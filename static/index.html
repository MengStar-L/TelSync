<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TelSync - TelDrive 文件同步</title>
    <meta name="description" content="TelDrive 远程文件同步管理工具">
    <link rel="stylesheet" href="/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 统一安装向导 Modal -->
    <div id="setupWizardModal" class="setup-overlay" style="display: none;">
        <div class="setup-box">
            <h2 style="text-align:center;margin-bottom:5px;">欢迎使用 TelSync</h2>
            <p style="text-align:center;color:#666;font-size:0.9em;margin-bottom:20px;">首次使用需要进行简单的初始化配置</p>

            <!-- 步骤 1: API 和本地目录配置 (未配置时显示) -->
            <div id="setupConfigArea" style="display: none; border-bottom: 1px solid #eaeaea; padding-bottom: 20px; margin-bottom: 20px;">
                <h3 style="font-size:1.1em;margin-bottom:15px;display:flex;align-items:center;gap:8px;">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="var(--primary-color)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
                    基础通信配置
                </h3>
                <div class="form-group">
                    <label>TelDrive 服务地址</label>
                    <input type="text" id="setupTeldriveUrl" placeholder="如: http://192.168.1.10:8080" class="cfg-input">
                </div>
                <div class="form-group">
                    <label>TelDrive 访问令牌 (Token)</label>
                    <input type="password" id="setupTeldriveToken" placeholder="您的长 token" class="cfg-input">
                </div>
                <div class="form-group">
                    <label>本地存储目录</label>
                    <input type="text" id="setupLocalPath" placeholder="绝对路径(如 Windows: D:/Movies, Linux: /mnt/data)" class="cfg-input">
                </div>
                <!-- 保存配置按钮放在这里，不装 aria2 时也需要 -->
                <button id="btnSaveConfigOnly" class="btn-primary" style="width: 100%; margin-top: 5px;">保存配置并开始</button>
            </div>

            <!-- 步骤 2: Aria2 安装 (未安装时显示) -->
            <div id="setupAria2Area" style="display: none;">
                <h3 style="font-size:1.1em;margin-bottom:10px;display:flex;align-items:center;gap:8px;">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#2ED573" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    安装 Aria2 下载核心
                </h3>
                <p style="font-size:0.9em;color:#666;margin-bottom:15px;">系统未检测到 <code>aria2c</code>，请选择架构以下载并部署：</p>
                <div class="setup-options">
                    <div class="arch-cards" id="setupArchCards">
                        <div class="arch-card active" data-value="win-x64">
                            <span>Windows 64位</span>
                        </div>
                        <div class="arch-card" data-value="linux-x64">
                            <span>Linux x86_64</span>
                        </div>
                        <div class="arch-card" data-value="linux-arm64">
                            <span>Linux ARM64</span>
                        </div>
                    </div>
                </div>
                <button id="btnInstallAria2" class="btn-primary" style="margin-top: 15px; width: 100%;">部署核心并进入应用</button>
                
                <div id="installProgressArea" class="install-progress-area" style="display: none;">
                    <div class="install-progress-bar-track">
                        <div class="install-progress-bar-fill" id="installProgressFill"></div>
                    </div>
                    <div class="install-progress-info">
                        <span id="installStatusText">准备中...</span>
                        <span id="installPercentText">0%</span>
                    </div>
                </div>
                
                <div class="setup-manual" style="margin-top: 15px; font-size: 0.85em; color: #666; text-align: center;">
                    <p>或 <span id="btnUploadAria2" class="text-link" style="color:var(--primary-color); cursor:pointer;">手动上传</span> aria2c 二进制文件</p>
                    <input type="file" id="uploadAria2Input" style="display:none">
                </div>
            </div>
        </div>
    </div>

    <!-- 左侧导航栏 -->
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <svg width="36" height="36" viewBox="0 0 32 32" fill="none">
                <defs><linearGradient id="logoGrad" x1="0" y1="0" x2="32" y2="32"><stop offset="0%" stop-color="#4F8EF7"/><stop offset="100%" stop-color="#6C5CE7"/></linearGradient></defs>
                <rect width="32" height="32" rx="16" fill="url(#logoGrad)"/>
                <path d="M10 16.5L15.5 11M15.5 11V21M15.5 11L21 16.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
                <path d="M11 21.5L16.5 16M16.5 16V26M16.5 16L22 21.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <div class="sidebar-nav">
            <button class="nav-item active" data-page="files" id="navFiles" title="文件对比">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                </svg>
                <span>文件</span>
            </button>
            <button class="nav-item" data-page="downloads" id="navDownloads" title="下载队列">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                <span>下载</span>
                <span class="nav-badge" id="navDownloadBadge"></span>
            </button>
            <button class="nav-item" data-page="settings" id="navSettings" title="设置">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
                <span>设置</span>
            </button>
        </div>
        <div class="sidebar-bottom">
            <div class="connection-indicator" id="connectionIndicator" title="未连接">
                <span class="conn-dot"></span>
            </div>
        </div>
    </nav>

    <!-- 主内容区 -->
    <div class="main-content">
        <!-- ===== 页面：文件对比（无header） ===== -->
        <div class="page active" id="pageFiles">
            <div class="panels-container">
                <!-- 左：远程 -->
                <div class="panel" id="panelRemote">
                    <div class="panel-header">
                        <div class="panel-title">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#4F8EF7" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                            <span>TelDrive 远程</span>
                            <button class="btn-icon-sm" id="btnRefresh" title="刷新">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="23,4 23,10 17,10"/><polyline points="1,20 1,14 7,14"/>
                                    <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                                </svg>
                            </button>
                        </div>
                        <div class="panel-stats" id="remoteStats">--</div>
                    </div>
                    <div class="tree-container" id="remoteTree">
                        <div class="empty-state">
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#cbd5e0" stroke-width="1.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                            <p>点击刷新加载远程文件树</p>
                        </div>
                    </div>
                </div>
                <!-- 右：本地 -->
                <div class="panel" id="panelLocal">
                    <div class="panel-header">
                        <div class="panel-title">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#00b894" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>
                            <span>本地文件</span>
                        </div>
                        <div class="panel-stats" id="localStats">--</div>
                    </div>
                    <div class="tree-container" id="localTree">
                        <div class="empty-state">
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#cbd5e0" stroke-width="1.5"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/></svg>
                            <p>配置本地路径后刷新</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ===== 页面：下载队列 ===== -->
        <div class="page" id="pageDownloads">
            <div class="page-header">
                <h2>下载队列</h2>
                <div class="page-header-actions group-actions">
                    <button class="btn-pill green" id="btnResumeAll">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 3l14 9-14 9V3z"/></svg> 恢复全部
                    </button>
                    <button class="btn-pill orange" id="btnPauseAll">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 4H6v16h4V4zm8 0h-4v16h4V4z"/></svg> 暂停全部
                    </button>
                    <button class="btn-pill red" id="btnClearFailed">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> 清理失败
                    </button>
                    <div class="action-divider"></div>
                    <button class="btn-pill red bold" id="btnForceClearAll">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg> 强杀清空
                    </button>
                </div>
            </div>
            <div class="download-page-content">
                <div class="dl-filter-row" id="dlStatsRow">
                    <button class="dl-filter-btn active" data-filter="all">
                        <span class="dl-filter-label">全部</span>
                        <span class="dl-filter-count" id="statAll">0</span>
                    </button>
                    <button class="dl-filter-btn" data-filter="downloading">
                        <span class="dl-filter-dot" style="background: var(--accent-blue)"></span>
                        <span class="dl-filter-label">下载中</span>
                        <span class="dl-filter-count" id="statDownloading">0</span>
                    </button>
                    <button class="dl-filter-btn" data-filter="queued">
                        <span class="dl-filter-dot" style="background: var(--accent-purple)"></span>
                        <span class="dl-filter-label">排队中</span>
                        <span class="dl-filter-count" id="statQueued">0</span>
                    </button>
                    <button class="dl-filter-btn" data-filter="failed">
                        <span class="dl-filter-dot" style="background: var(--accent-red)"></span>
                        <span class="dl-filter-label">失败</span>
                        <span class="dl-filter-count" id="statFailed">0</span>
                    </button>
                </div>
                <div class="download-list-full" id="downloadListFull">
                    <div class="empty-state"><p>暂无下载任务</p></div>
                </div>
            </div>
        </div>

        <!-- ===== 页面：设置 ===== -->
        <div class="page" id="pageSettings">
            <div class="page-header"><h2>设置</h2></div>
            <div class="settings-content">
                <div class="settings-section">
                    <div class="settings-section-header">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent-blue)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                        <h3>连接配置</h3>
                    </div>
                    <div class="settings-group">
                        <div class="form-group">
                            <label for="inputTeldriveUrl">TelDrive 地址</label>
                            <input type="url" id="inputTeldriveUrl" placeholder="例如: https://teldrive.example.com">
                        </div>
                        <div class="form-group">
                            <label for="inputAccessToken">Access Token (Cookie)</label>
                            <input type="password" id="inputAccessToken" placeholder="从 Cookie 中复制 access_token 值">
                            <small>在 TelDrive 网页登录后，F12 → Application → Cookies 获取</small>
                        </div>
                    </div>
                </div>
                <div class="settings-section">
                    <div class="settings-section-header">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent-green)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                        <h3>下载设置</h3>
                    </div>
                    <div class="settings-group">
                        <div class="form-group">
                            <label for="inputLocalPath">本地同步文件夹</label>
                            <input type="text" id="inputLocalPath" placeholder="例如: D:\Downloads 或 /mnt/data/downloads">
                        </div>
                        <div class="form-row">
                            <div class="form-group" style="flex:1">
                                <label for="inputMaxConcurrent">最大并发下载数</label>
                                <input type="number" id="inputMaxConcurrent" min="1" max="5" value="2">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="settings-actions">
                    <button class="btn btn-secondary" id="btnTestConnection">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                        测试连接
                    </button>
                    <button class="btn btn-primary" id="btnSaveConfig">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                        保存配置
                    </button>
                </div>
                <div class="test-result" id="testResult"></div>
            </div>
        </div>
    </div>

    <!-- 自定义确认弹窗 -->
    <div class="confirm-overlay" id="confirmOverlay">
        <div class="confirm-dialog">
            <div class="confirm-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            </div>
            <div class="confirm-content">
                <h3 id="confirmTitle">确认操作</h3>
                <p id="confirmDesc">描述描述...</p>
            </div>
            <div class="confirm-actions">
                <button class="btn btn-ghost" id="btnConfirmCancel">取消</button>
                <button class="btn btn-primary btn-danger" id="btnConfirmOk">确定删除</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>
    <script src="/app.js"></script>
</body>
</html>
